<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSH2Tech | Cloud Inventory Dashboard</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --sidebar: #0f172a;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 260px; background-color: var(--sidebar); color: white;
            display: flex; flex-direction: column; position: fixed;
            height: 100vh; transition: all 0.3s; z-index: 1000;
        }
        .sidebar-header { padding: 30px 20px; text-align: center; font-weight: 700; font-size: 1.2rem; border-bottom: 1px solid #1e293b; }
        .nav-links { padding: 20px 0; flex-grow: 1; }
        .nav-item {
            padding: 14px 25px; display: flex; align-items: center; cursor: pointer;
            color: #94a3b8; transition: 0.2s; text-decoration: none;
        }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .nav-item:hover, .nav-item.active { background-color: #1e293b; color: white; border-left: 4px solid var(--primary); }
        .logout-area { padding: 20px; border-top: 1px solid #1e293b; }

        /* Main Content */
        .main-content { margin-left: 260px; flex-grow: 1; padding: 40px; width: calc(100% - 260px); }
        .view-section { display: none; animation: fadeIn 0.3s; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Forms */
        .form-card { background: white; padding: 30px; border-radius: 16px; border: 1px solid #e2e8f0; max-width: 600px; margin: 0 auto; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; color: var(--text-muted); }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; outline: none; }
        input:focus { border-color: var(--primary); }

        /* Auth Screen */
        #authSection { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }

        /* KPIs & Tables */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .table-container { background: white; border-radius: 16px; border: 1px solid #e2e8f0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }

        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-danger { background: var(--danger); color: white; padding: 8px 12px; }
        .btn-warning { background: var(--warning); color: white; padding: 8px 12px; }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar span, .sidebar-header { display: none; }
            .main-content { margin-left: 70px; width: calc(100% - 70px); padding: 20px; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div id="authSection">
    <div class="auth-card">
        <h2 style="text-align:center">Cloud Login</h2>
        <div class="input-group">
            <input type="email" id="authEmail" placeholder="Email Address">
        </div>
        <div class="input-group">
            <input type="password" id="authPwd" placeholder="Password">
        </div>
        <button class="btn btn-primary" id="authBtn">Sign In</button>
    </div>
</div>

<!-- Sidebar -->
<nav class="sidebar hidden" id="sidebar">
    <div class="sidebar-header">JSH2Tech</div>
    <div class="nav-links">
        <div class="nav-item active" onclick="showView('v-dash', this)"><i class="fas fa-chart-line"></i><span>Dashboard</span></div>
        <div class="nav-item" onclick="showView('v-add', this)"><i class="fas fa-plus-circle"></i><span>Add Product</span></div>
        <div class="nav-item" onclick="showView('v-list', this)"><i class="fas fa-boxes-stacked"></i><span>Full Inventory</span></div>
        <div class="nav-item" onclick="showView('v-qr', this)"><i class="fas fa-qrcode"></i><span>QR Scanner</span></div>
    </div>
    <div class="logout-area">
        <button onclick="logout()" class="btn btn-danger" style="width: 100%">Logout</button>
    </div>
</nav>

<!-- Main -->
<main class="main-content hidden" id="mainContent">
    <!-- Dashboard -->
    <section id="v-dash" class="view-section active">
        <h1>Performance</h1>
        <div class="kpi-grid">
            <div class="kpi-card"><h3>Profit</h3><div id="kpi-pos" style="color:var(--success); font-size:1.5rem; font-weight:700">₱0</div></div>
            <div class="kpi-card"><h3>Stock Value</h3><div id="kpi-neg" style="color:var(--warning); font-size:1.5rem; font-weight:700">₱0</div></div>
            <div class="kpi-card"><h3>Net</h3><div id="kpi-net" style="font-size:1.5rem; font-weight:700">₱0</div></div>
        </div>
    </section>

    <!-- Add Product Form -->
    <section id="v-add" class="view-section">
        <h1>Add New Product</h1>
        <div class="form-card">
            <div class="input-group">
                <label>Product Name</label>
                <input type="text" id="pName" placeholder="Enter name">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex:1">
                    <label>Date</label>
                    <input type="date" id="pDate">
                </div>
                <div class="input-group" style="flex:1">
                    <label>Quantity</label>
                    <input type="number" id="qty" placeholder="0">
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex:1">
                    <label>Cost Price (₱)</label>
                    <input type="number" id="bPrice" placeholder="0.00">
                </div>
                <div class="input-group" style="flex:1">
                    <label>Selling Price (₱)</label>
                    <input type="number" id="sPrice" placeholder="0.00">
                </div>
            </div>
            <button class="btn btn-primary" id="actionBtn" style="margin-top:10px">Save to Cloud</button>
        </div>
    </section>

    <!-- Inventory List -->
    <section id="v-list" class="view-section">
        <h1>Complete Inventory</h1>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Product</th><th>Date</th><th>Qty</th><th>Profit</th><th>Action</th></tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </div>
    </section>
</main>

<!-- Edit Modal -->
<div id="editModal" class="modal-overlay hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; display:flex; align-items:center; justify-content:center;">
    <div class="form-card" style="width: 90%">
        <h3>Edit Record</h3>
        <input type="hidden" id="m_id">
        <input type="text" id="m_name" style="margin-bottom:10px" placeholder="Name">
        <input type="date" id="m_date" style="margin-bottom:10px">
        <input type="number" id="m_qty" style="margin-bottom:10px" placeholder="Qty">
        <input type="number" id="m_buy" style="margin-bottom:10px" placeholder="Buy">
        <input type="number" id="m_sell" style="margin-bottom:10px" placeholder="Sell">
        <button class="btn btn-primary" id="updateBtn">Update Product</button>
        <button class="btn" onclick="closeEditModal()" style="width:100%; margin-top:10px; background:#e2e8f0">Cancel</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCaU8ZlDt3iWsqMnLzmMF2cwe_Zj6Ls72A",
        authDomain: "jsh2tech-inventory-e8b34.firebaseapp.com",
        projectId: "jsh2tech-inventory-e8b34",
        storageBucket: "jsh2tech-inventory-e8b34.firebasestorage.app",
        messagingSenderId: "606686103127",
        appId: "1:606686103127:web:e0a24aa8fad24ce3268512",
        databaseURL: "https://jsh2tech-inventory-e8b34-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const inventoryRef = ref(db, 'inventory');
    let fullData = [];

    // Login logic
    document.getElementById('authBtn').onclick = () => {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPwd').value;
        signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Error: " + e.message));
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            onValue(inventoryRef, (snap) => {
                const data = snap.val();
                fullData = [];
                for(let key in data) fullData.push({ id: key, ...data[key] });
                renderAll();
            });
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('mainContent').classList.add('hidden');
        }
    });

    // Add logic
    document.getElementById('actionBtn').onclick = () => {
        const name = document.getElementById('pName').value;
        const date = document.getElementById('pDate').value;
        const qty = parseInt(document.getElementById('qty').value);
        const buy = parseFloat(document.getElementById('bPrice').value);
        const sell = parseFloat(document.getElementById('sPrice').value);

        if(!name || !qty) return alert("Please fill details");

        push(inventoryRef, {
            name, date, qty, buy, sell,
            profit: (sell - buy) * qty
        }).then(() => {
            alert("Added!");
            document.querySelectorAll('#v-add input').forEach(i => i.value = '');
        });
    };

    function renderAll() {
        const iBody = document.getElementById('inventoryBody');
        iBody.innerHTML = '';
        let pos = 0, neg = 0;

        fullData.forEach(i => {
            const p = i.profit || 0;
            if(p >= 0) pos += p; else neg += p;

            const row = iBody.insertRow();
            row.innerHTML = `
                <td>${i.name}</td>
                <td>${i.date}</td>
                <td>${i.qty}</td>
                <td style="color:${p>=0?'var(--success)':'var(--danger)'}">₱${p.toLocaleString()}</td>
                <td>
                    <button class="btn btn-warning" onclick="openEditModal('${i.id}')"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-danger" onclick="deleteItem('${i.id}')"><i class="fas fa-trash"></i></button>
                </td>
            `;
        });
        document.getElementById('kpi-pos').innerText = "₱" + pos.toLocaleString();
        document.getElementById('kpi-neg').innerText = "₱" + Math.abs(neg).toLocaleString();
        document.getElementById('kpi-net').innerText = "₱" + (pos+neg).toLocaleString();
    }

    // View switcher
    window.showView = (id, el) => {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
    };

    window.openEditModal = (id) => {
        const item = fullData.find(i => i.id === id);
        document.getElementById('m_id').value = id;
        document.getElementById('m_name').value = item.name;
        document.getElementById('m_date').value = item.date;
        document.getElementById('m_qty').value = item.qty;
        document.getElementById('m_buy').value = item.buy;
        document.getElementById('m_sell').value = item.sell;
        document.getElementById('editModal').classList.remove('hidden');
    };

    window.closeEditModal = () => document.getElementById('editModal').classList.add('hidden');

    document.getElementById('updateBtn').onclick = () => {
        const id = document.getElementById('m_id').value;
        const buy = parseFloat(document.getElementById('m_buy').value);
        const sell = parseFloat(document.getElementById('m_sell').value);
        const qty = parseInt(document.getElementById('m_qty').value);

        update(ref(db, 'inventory/' + id), {
            name: document.getElementById('m_name').value,
            date: document.getElementById('m_date').value,
            buy, sell, qty,
            profit: (sell - buy) * qty
        }).then(() => closeEditModal());
    };

    window.deleteItem = (id) => { if(confirm("Delete record?")) remove(ref(db, 'inventory/'+id)); };
</script>
</body>
</html>
