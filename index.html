<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSH2Tech | Cloud Inventory Dashboard</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --sidebar: #0f172a;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 260px; background-color: var(--sidebar); color: white;
            display: flex; flex-direction: column; position: fixed;
            height: 100vh; transition: all 0.3s; z-index: 1000;
        }
        .sidebar-header { padding: 30px 20px; text-align: center; font-weight: 700; font-size: 1.2rem; border-bottom: 1px solid #1e293b; }
        .nav-links { padding: 20px 0; flex-grow: 1; }
        .nav-item {
            padding: 14px 25px; display: flex; align-items: center; cursor: pointer;
            color: #94a3b8; transition: 0.2s; text-decoration: none;
        }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .nav-item:hover, .nav-item.active { background-color: #1e293b; color: white; border-left: 4px solid var(--primary); }
        .logout-area { padding: 20px; border-top: 1px solid #1e293b; }

        /* Content Area */
        .main-content { margin-left: 260px; flex-grow: 1; padding: 40px; width: calc(100% - 260px); }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Auth Screen */
        #authSection { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }

        /* KPIs */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .kpi-card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #e2e8f0; }
        .value { font-size: 1.8rem; font-weight: 700; margin: 10px 0; }

        /* Buttons & Tables */
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .table-container { background: white; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2001; }
        .modal-card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; }
        
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar span, .sidebar-header { display: none; }
            .main-content { margin-left: 70px; width: calc(100% - 70px); }
        }
    </style>
</head>
<body>

<div id="authSection">
    <div class="auth-card">
        <h2 style="text-align: center;">Cloud Login</h2>
        <input type="email" id="authEmail" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <input type="password" id="authPwd" placeholder="Password" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #ddd;">
        <button class="btn btn-primary" id="authBtn" style="width: 100%; justify-content: center;">Sign In</button>
    </div>
</div>

<nav class="sidebar hidden" id="sidebar">
    <div class="sidebar-header">JSH2Tech</div>
    <div class="nav-links">
        <div class="nav-item active" onclick="showView('v-dash', this)"><i class="fas fa-chart-line"></i><span>Dashboard</span></div>
        <div class="nav-item" onclick="showView('v-add', this)"><i class="fas fa-plus"></i><span>Add Product</span></div>
        <div class="nav-item" onclick="showView('v-list', this)"><i class="fas fa-list"></i><span>Inventory List</span></div>
        <div class="nav-item" onclick="showView('v-qr', this)"><i class="fas fa-qrcode"></i><span>Scanner</span></div>
    </div>
    <div class="logout-area">
        <button onclick="logout()" class="btn btn-danger" style="width: 100%;"><i class="fas fa-sign-out-alt"></i>Logout</button>
    </div>
</nav>

<main class="main-content hidden" id="mainContent">
    <section id="v-dash" class="view-section active">
        <h1>Overview</h1>
        <div class="kpi-grid">
            <div class="kpi-card"><h3>Total Profit</h3><div class="value" id="kpi-pos" style="color:var(--success);">₱0</div></div>
            <div class="kpi-card"><h3>Invested</h3><div class="value" id="kpi-neg" style="color:var(--warning);">₱0</div></div>
            <div class="kpi-card"><h3>Net</h3><div class="value" id="kpi-net">₱0</div></div>
        </div>
    </section>

    <section id="v-list" class="view-section">
        <h1>Inventory Records</h1>
        <div class="table-container">
            <table>
                <thead><tr><th>Product</th><th>Date</th><th>Qty</th><th>Profit</th><th>Actions</th></tr></thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </div>
    </section>

    <section id="v-add" class="view-section">
        <h1>New Entry</h1>
        <div class="auth-card" style="max-width: 100%;">
            <input type="text" id="pName" placeholder="Product Name"><br><br>
            <input type="date" id="pDate"><br><br>
            <input type="number" id="qty" placeholder="Quantity"><br><br>
            <input type="number" id="bPrice" placeholder="Buy Price"><br><br>
            <input type="number" id="sPrice" placeholder="Sell Price"><br><br>
            <button class="btn btn-primary" id="actionBtn">Add Record</button>
        </div>
    </section>
</main>

<div id="editModal" class="modal-overlay hidden">
    <div class="modal-card">
        <h3>Edit Item</h3>
        <input type="hidden" id="m_editId">
        <input type="text" id="m_pName" style="width:100%; margin-bottom:10px;">
        <input type="date" id="m_pDate" style="width:100%; margin-bottom:10px;">
        <input type="number" id="m_qty" placeholder="Qty" style="width:100%; margin-bottom:10px;">
        <input type="number" id="m_bPrice" placeholder="Buy" style="width:100%; margin-bottom:10px;">
        <input type="number" id="m_sPrice" placeholder="Sell" style="width:100%; margin-bottom:10px;">
        <div style="display:flex; gap:10px;">
            <button class="btn btn-primary" id="saveEditBtn">Update</button>
            <button class="btn" onclick="closeEditModal()">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCaU8ZlDt3iWsqMnLzmMF2cwe_Zj6Ls72A",
        authDomain: "jsh2tech-inventory-e8b34.firebaseapp.com",
        projectId: "jsh2tech-inventory-e8b34",
        storageBucket: "jsh2tech-inventory-e8b34.firebasestorage.app",
        messagingSenderId: "606686103127",
        appId: "1:606686103127:web:e0a24aa8fad24ce3268512",
        databaseURL: "https://jsh2tech-inventory-e8b34-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const inventoryRef = ref(db, 'inventory');
    let fullData = [];

    // --- FIX 1: Login Event Listener ---
    document.getElementById('authBtn').onclick = () => {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPwd').value;
        signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        const authView = document.getElementById('authSection');
        const sidebar = document.getElementById('sidebar');
        const main = document.getElementById('mainContent');
        if(user) {
            authView.classList.add('hidden');
            sidebar.classList.remove('hidden');
            main.classList.remove('hidden');
            onValue(inventoryRef, (snap) => {
                const data = snap.val();
                fullData = [];
                for(let key in data) fullData.push({ id: key, ...data[key] });
                renderAll();
            });
        } else {
            authView.classList.remove('hidden');
            sidebar.classList.add('hidden');
            main.classList.add('hidden');
        }
    });

    // --- FIX 2: Re-added Edit and Delete rendering ---
    function renderAll() {
        const iBody = document.getElementById('inventoryBody');
        iBody.innerHTML = '';
        let pos = 0, neg = 0;

        fullData.forEach(i => {
            const p = i.profit || 0;
            if(p >= 0) pos += p; else neg += p;

            const row = iBody.insertRow();
            row.innerHTML = `
                <td>${i.name}</td>
                <td>${i.date}</td>
                <td>${i.qty}</td>
                <td style="color:${p >= 0 ? 'var(--success)' : 'var(--danger)'}">₱${p.toLocaleString()}</td>
                <td>
                    <button class="btn btn-warning" onclick="openEditModal('${i.id}')"><i class="fas fa-pen"></i></button>
                    <button class="btn btn-danger" onclick="deleteItem('${i.id}')"><i class="fas fa-trash"></i></button>
                </td>
            `;
        });
        document.getElementById('kpi-pos').innerText = "₱" + pos.toLocaleString();
        document.getElementById('kpi-neg').innerText = "₱" + Math.abs(neg).toLocaleString();
        document.getElementById('kpi-net').innerText = "₱" + (pos+neg).toLocaleString();
    }

    // Modal Logic
    window.openEditModal = (id) => {
        const item = fullData.find(i => i.id === id);
        document.getElementById('m_editId').value = id;
        document.getElementById('m_pName').value = item.name;
        document.getElementById('m_pDate').value = item.date;
        document.getElementById('m_qty').value = item.qty;
        document.getElementById('m_bPrice').value = item.buy;
        document.getElementById('m_sPrice').value = item.sell;
        document.getElementById('editModal').classList.remove('hidden');
    };

    window.closeEditModal = () => document.getElementById('editModal').classList.add('hidden');

    document.getElementById('saveEditBtn').onclick = () => {
        const id = document.getElementById('m_editId').value;
        const buy = parseFloat(document.getElementById('m_bPrice').value);
        const sell = parseFloat(document.getElementById('m_sPrice').value);
        const qty = parseInt(document.getElementById('m_qty').value);
        update(ref(db, 'inventory/'+id), {
            name: document.getElementById('m_pName').value,
            date: document.getElementById('m_pDate').value,
            buy: buy, sell: sell, qty: qty,
            profit: (sell - buy) * qty
        }).then(() => closeEditModal());
    };

    window.deleteItem = (id) => { if(confirm("Delete?")) remove(ref(db, 'inventory/'+id)); };

    window.showView = (id, el) => {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
    };

    // Add logic
    document.getElementById('actionBtn').onclick = () => {
        const b = parseFloat(document.getElementById('bPrice').value);
        const s = parseFloat(document.getElementById('sPrice').value);
        const q = parseInt(document.getElementById('qty').value);
        push(inventoryRef, {
            name: document.getElementById('pName').value,
            date: document.getElementById('pDate').value,
            buy: b, sell: s, qty: q, profit: (s - b) * q
        });
    };
</script>
</body>
</html>
